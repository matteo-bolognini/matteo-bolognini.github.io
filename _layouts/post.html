---
layout: default
---
<div class="wrapper">
  <article>
    <header class="post-header">
      <p class="post-eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
      <h1>{{ page.title }}</h1>
    </header>
    <hr class="post-divider">
    <div class="prose">
      {{ content }}
    </div>
  </article>
</div>
