<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">Skartek</a>
      <nav>
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Writing</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>About</a>
        <a href="https://github.com/matteo-bolognini" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ 'now' | date: "%Y" }} Matteo Bolognini</span>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </div>
  </footer>

</body>
</html>
